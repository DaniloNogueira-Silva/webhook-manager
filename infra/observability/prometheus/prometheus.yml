global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'webhook-platform-api'
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:3000']

  - job_name: 'webhook-platform-worker'
    metrics_path: /metrics
    static_configs:
      - targets: ['host.docker.internal:3002']