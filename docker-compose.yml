services:
  postgres:
    image: postgres:16-alpine
    container_name: webhook-platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: webhook_platform
      POSTGRES_USER: webhook_user
      POSTGRES_PASSWORD: webhook_pass
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U webhook_user -d webhook_platform' ]
      interval: 10s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:latest
    container_name: webhook-platform-localstack
    restart: unless-stopped
    environment:
      SERVICES: sqs
      DEBUG: 1
      PERSISTENCE: 1
      AWS_DEFAULT_REGION: us-east-1
    ports:
      - '4566:4566'
    volumes:
      - localstack_data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
      - ./infra/localstack/init:/etc/localstack/init
    healthcheck:
      test: [ 'CMD', 'bash', '-c', 'curl -s http://localhost:4566/_localstack/health | grep -q running' ]
      interval: 10s
      timeout: 5s
      retries: 10

  prometheus:
    image: prom/prometheus:latest
    container_name: webhook-platform-prometheus
    restart: unless-stopped
    ports:
      - '9090:9090'
    volumes:
      - ./infra/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    depends_on:
      - grafana

  grafana:
    image: grafana/grafana:latest
    container_name: webhook-platform-grafana
    restart: unless-stopped
    ports:
      - '3001:3000'
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./infra/observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro

volumes:
  postgres_data:
  localstack_data:
  grafana_data:
