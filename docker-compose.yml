services:
  postgres:
    image: postgres:16-alpine
    container_name: webhook-platform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: webhook_platform
      POSTGRES_USER: webhook_user
      POSTGRES_PASSWORD: webhook_pass
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ 'CMD-SHELL', 'pg_isready -U webhook_user -d webhook_platform' ]
      interval: 10s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:latest
    container_name: webhook-platform-localstack
    restart: unless-stopped
    environment:
      SERVICES: sqs
      DEBUG: 1
      PERSISTENCE: 1
      AWS_DEFAULT_REGION: us-east-1
    ports:
      - '4566:4566'
    volumes:
      - localstack_data:/var/lib/localstack
      - /var/run/docker.sock:/var/run/docker.sock
      - ./infra/localstack/init:/etc/localstack/init
    healthcheck:
      test: [ 'CMD', 'bash', '-c', 'curl -s http://localhost:4566/_localstack/health | grep -q running' ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  localstack_data:
